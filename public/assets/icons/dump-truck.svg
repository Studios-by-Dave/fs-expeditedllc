  <circle cx="20" cy="42" r="1.5" fill="#FBBF24"/>
  <circle cx="48" cy="42" r="5" fill="#FBBF24" fill-opacity="0.2" stroke="#FBBF24" stroke-width="2.5"/>
  <circle cx="48" cy="42" r="1.5" fill="#FBBF24"/>
  <!-- Bumper -->
  <line x1="6" y1="36" x2="6" y2="42" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="36" x2="10" y2="36" stroke="#FBBF24" stroke-width="2" stroke-linecap="round"/>
