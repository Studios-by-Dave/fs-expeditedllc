<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Excavator arm -->
  <path d="M20 42L28 22L46 14" stroke="#FBBF24" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Arm hydraulic detail -->
  <path d="M24 32L32 20" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <!-- Bucket -->
  <path d="M46 14L54 18L52 26L44 22Z" fill="#FBBF24" fill-opacity="0.25" stroke="#FBBF24" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Bucket teeth -->
  <line x1="46" y1="24" x2="47" y2="27" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="49" y1="25" x2="50" y2="28" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="52" y1="26" x2="52.5" y2="29" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cab body -->
  <rect x="10" y="34" width="20" height="12" rx="2" fill="#FBBF24" fill-opacity="0.15" stroke="#FBBF24" stroke-width="2.5"/>
  <!-- Cab window -->
  <rect x="14" y="36" width="8" height="5" rx="1" fill="#FBBF24" fill-opacity="0.35"/>
  <!-- Tracks -->
  <rect x="6" y="48" width="28" height="6" rx="3" fill="#FBBF24" fill-opacity="0.15" stroke="#FBBF24" stroke-width="2.5"/>
  <!-- Track wheels -->
  <circle cx="12" cy="51" r="2" fill="#FBBF24" fill-opacity="0.3"/>
  <circle cx="20" cy="51" r="2" fill="#FBBF24" fill-opacity="0.3"/>
  <circle cx="28" cy="51" r="2" fill="#FBBF24" fill-opacity="0.3"/>
  <!-- Ground line -->
  <line x1="4" y1="56" x2="60" y2="56" stroke="#FBBF24" stroke-width="2" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Pivot point -->
  <circle cx="20" cy="42" r="2" fill="#FBBF24"/>
</svg>
