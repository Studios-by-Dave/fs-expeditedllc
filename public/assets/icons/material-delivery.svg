<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Pile of aggregate/rocks -->
  <path d="M8 48C8 48 16 28 32 28C48 28 56 48 56 48H8Z" fill="#FBBF24" fill-opacity="0.1" stroke="#FBBF24" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Individual rocks for texture -->
  <ellipse cx="24" cy="40" rx="5" ry="3.5" fill="#FBBF24" fill-opacity="0.25" stroke="#FBBF24" stroke-width="1.5"/>
  <ellipse cx="36" cy="38" rx="6" ry="4" fill="#FBBF24" fill-opacity="0.2" stroke="#FBBF24" stroke-width="1.5"/>
  <ellipse cx="30" cy="44" rx="5" ry="3" fill="#FBBF24" fill-opacity="0.3" stroke="#FBBF24" stroke-width="1.5"/>
  <ellipse cx="18" cy="44" rx="4" ry="2.5" fill="#FBBF24" fill-opacity="0.2" stroke="#FBBF24" stroke-width="1.5"/>
  <ellipse cx="42" cy="43" rx="4.5" ry="3" fill="#FBBF24" fill-opacity="0.25" stroke="#FBBF24" stroke-width="1.5"/>
  <!-- Falling rocks (motion) -->
  <circle cx="28" cy="20" r="2.5" fill="#FBBF24" fill-opacity="0.4" stroke="#FBBF24" stroke-width="1.5"/>
  <circle cx="36" cy="16" r="2" fill="#FBBF24" fill-opacity="0.3" stroke="#FBBF24" stroke-width="1.5"/>
  <circle cx="22" cy="14" r="1.5" fill="#FBBF24" fill-opacity="0.25" stroke="#FBBF24" stroke-width="1.5"/>
  <!-- Motion lines -->
  <line x1="28" y1="15" x2="28" y2="11" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.5"/>
  <line x1="36" y1="11" x2="36" y2="8" stroke="#FBBF24" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.4"/>
  <!-- Ground line -->
  <line x1="4" y1="48" x2="60" y2="48" stroke="#FBBF24" stroke-width="2.5" stroke-linecap="round"/>
</svg>
